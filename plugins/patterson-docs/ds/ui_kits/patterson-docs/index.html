<!-- @dsCard group="Patterson Docs" viewport="1400x920" name="Patterson Docs" subtitle="VitePress + MDX docs site, organised by Diátaxis" -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patterson Docs — VitePress + Diátaxis UI kit</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root{
  --c-bg:#ffffff; --c-bg-alt:#f6f7f8; --c-bg-soft:#f6f7f8;
  --c-text:#1d1d20; --c-text-2:#58585B; --c-text-3:#8a8a8e;
  --c-border:#e4e5e8; --c-divider:#ececec;
  --c-brand:#003767; --c-brand-2:#00A8E1; --c-brand-3:#147EC2;
  --c-brand-soft:rgba(0,168,225,.10); --c-brand-line:rgba(0,168,225,.55);
  --code-bg:#f6f7f8; --code-block-bg:#1b2432; --code-block-text:#d6dbe4; --code-block-dim:#7c8aa0;
  --nav-h:64px; --sb-w:280px; --aside-w:230px;
  --radius:9px; --shadow:0 6px 24px rgba(0,55,103,.10);
  --sans:var(--font-sans,'Figtree',system-ui,sans-serif);
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
}
html[data-theme=dark]{
  --c-bg:#15181e; --c-bg-alt:#1b1f27; --c-bg-soft:#20252e;
  --c-text:#f1f3f5; --c-text-2:#b4bac4; --c-text-3:#828a96;
  --c-border:#2a2f39; --c-divider:#262b34;
  --c-brand:#6DCFF6; --c-brand-2:#00A8E1; --c-brand-3:#6DCFF6;
  --c-brand-soft:rgba(0,168,225,.14); --c-brand-line:rgba(0,168,225,.5);
  --code-bg:#20252e; --code-block-bg:#0f141c; --code-block-text:#cdd4de; --code-block-dim:#6b7686;
  --shadow:0 6px 26px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--c-bg);color:var(--c-text);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
a{color:var(--c-brand-3);text-decoration:none}
a:hover{color:var(--c-brand-2)}
.ext-icon{margin-left:3px;opacity:.5;vertical-align:-1px}

/* ---------- top nav ---------- */
.vp-nav{position:sticky;top:0;z-index:30;height:var(--nav-h);background:color-mix(in srgb,var(--c-bg) 82%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--c-divider)}
.vp-nav-inner{max-width:1440px;margin:0 auto;height:100%;display:flex;align-items:center;gap:18px;padding:0 24px}
.vp-hamburger{display:none;background:none;border:none;color:var(--c-text-2);cursor:pointer;padding:6px}
.vp-logo{display:flex;align-items:center;gap:10px;color:var(--c-text);font-weight:700;letter-spacing:-.01em}
.vp-logo-mark{width:30px;height:30px;border-radius:8px;background:var(--c-brand);color:#fff;display:grid;place-items:center;font-weight:800;font-size:18px}
html[data-theme=dark] .vp-logo-mark{background:var(--c-brand-2);color:#00263f}
.vp-logo-text{font-size:16px}.vp-logo-text b{color:var(--c-brand-3);font-weight:800}
.vp-nav-links{display:flex;gap:2px;margin-left:8px}
.vp-nav-link{padding:6px 12px;border-radius:7px;color:var(--c-text-2);font-size:14.5px;font-weight:600}
.vp-nav-link:hover{color:var(--c-text);background:var(--c-bg-alt)}
.vp-nav-link.active{color:var(--c-brand-3)}
.vp-nav-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
.vp-search-btn{display:flex;align-items:center;gap:8px;height:36px;padding:0 8px 0 11px;border:1px solid var(--c-border);background:var(--c-bg-alt);border-radius:8px;color:var(--c-text-3);font-family:inherit;font-size:13.5px;cursor:pointer;transition:border-color .15s}
.vp-search-btn:hover{border-color:var(--c-brand-line)}
.vp-search-btn span:first-of-type{font-weight:500}
.vp-kbd{font-family:var(--mono);font-size:11px;border:1px solid var(--c-border);border-radius:5px;padding:2px 6px;color:var(--c-text-3);background:var(--c-bg)}
.vp-kbd.sm{padding:1px 5px;background:var(--c-bg)}
.vp-icon-btn{display:grid;place-items:center;width:36px;height:36px;border-radius:8px;border:none;background:none;color:var(--c-text-2);cursor:pointer}
.vp-icon-btn:hover{background:var(--c-bg-alt);color:var(--c-text)}

/* ---------- shell ---------- */
.vp-shell{max-width:1440px;margin:0 auto;display:flex;align-items:flex-start;padding:0 24px}
.vp-sidebar-wrap{width:var(--sb-w);flex:none;position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow-y:auto;padding:26px 22px 40px 0}
.vp-content{flex:1;min-width:0}
.vp-content.home{max-width:1152px;margin:0 auto;padding:0 24px}

/* ---------- sidebar ---------- */
.vp-sb-group{margin-bottom:22px}
.vp-sb-title{margin:0 0 6px;font-size:13px;font-weight:800;letter-spacing:.01em;color:var(--c-text)}
.vp-sidebar ul{list-style:none;margin:0;padding:0}
.vp-sb-link{display:flex;align-items:center;gap:6px;padding:5px 0 5px 12px;margin-left:-1px;border-left:1.5px solid var(--c-divider);font-size:13.75px;font-weight:500;color:var(--c-text-2);line-height:1.4}
.vp-sb-link:hover{color:var(--c-text)}
.vp-sb-link.active{color:var(--c-brand-3);border-left-color:var(--c-brand-2);font-weight:700}
.vp-sb-badge{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--c-brand-3);background:var(--c-brand-soft);padding:1px 5px;border-radius:20px}

/* ---------- doc ---------- */
.vp-doc-wrap{padding:32px 0 64px;min-height:calc(100vh - var(--nav-h))}
.vp-doc-layout{display:flex;gap:40px;padding-left:40px}
.vp-doc{flex:1;min-width:0;max-width:720px}
.vp-breadcrumb{margin:0 0 8px;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--c-brand-3)}
.vp-doc h1{font-size:33px;line-height:1.2;letter-spacing:-.02em;margin:0 0 8px;font-weight:800;display:flex;flex-wrap:wrap;align-items:center;gap:12px}
.vp-badge{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--c-brand-3);background:var(--c-brand-soft);padding:3px 9px;border-radius:20px}
.vp-lead{font-size:18px;line-height:1.6;color:var(--c-text-2);margin:0 0 26px}
.vp-doc h2{font-size:23px;font-weight:700;letter-spacing:-.01em;margin:44px 0 16px;padding-top:22px;border-top:1px solid var(--c-divider);scroll-margin-top:84px}
.vp-doc h3{font-size:18px;font-weight:700;margin:28px 0 12px;scroll-margin-top:84px}
.header-anchor{margin-left:8px;color:var(--c-brand-2);opacity:0;font-weight:500;text-decoration:none}
.vp-doc h2:hover .header-anchor{opacity:.7}
.vp-doc p{margin:16px 0}
.vp-doc ul,.vp-doc ol{margin:16px 0;padding-left:24px}
.vp-doc li{margin:7px 0}
.vp-doc li::marker{color:var(--c-text-3)}
.inline-code{font-family:var(--mono);font-size:.85em;background:var(--c-bg-alt);border:1px solid var(--c-border);padding:.12em .4em;border-radius:5px;color:var(--c-brand-3)}

/* code block */
.vp-code{position:relative;margin:20px 0;border-radius:var(--radius);background:var(--code-block-bg);overflow:hidden}
.vp-code-lang{position:absolute;top:9px;right:14px;font-family:var(--mono);font-size:11px;color:var(--code-block-dim);text-transform:uppercase;letter-spacing:.05em}
.vp-code pre{margin:0;padding:18px 20px;overflow-x:auto}
.vp-code code{font-family:var(--mono);font-size:13.25px;line-height:1.7;color:var(--code-block-text);white-space:pre}
.tok-comment{color:var(--code-block-dim);font-style:italic}
.tok-prompt{color:#6DCFF6}

/* custom blocks */
.custom-block{margin:20px 0;padding:14px 18px;border-radius:var(--radius);border-left:4px solid;font-size:14.5px}
.custom-block p{margin:6px 0}
.custom-block-title{font-weight:800;font-size:12.5px;text-transform:uppercase;letter-spacing:.05em;margin-top:0!important}
.custom-block.tip{background:var(--c-brand-soft);border-color:var(--c-brand-2)}
.custom-block.tip .custom-block-title{color:var(--c-brand-3)}
.custom-block.info{background:var(--c-bg-alt);border-color:var(--c-text-3)}
.custom-block.info .custom-block-title{color:var(--c-text-2)}
.custom-block.warning{background:#fbf1df;border-color:#d98a00}
.custom-block.warning .custom-block-title{color:#a86a00}
.custom-block.danger{background:#f8eae8;border-color:#c0392b}
.custom-block.danger .custom-block-title{color:#a4291c}
html[data-theme=dark] .custom-block.warning{background:rgba(217,138,0,.12)}
html[data-theme=dark] .custom-block.warning .custom-block-title{color:#e6a52e}
html[data-theme=dark] .custom-block.danger{background:rgba(192,57,43,.14)}
html[data-theme=dark] .custom-block.danger .custom-block-title{color:#e8776a}

/* compass note */
.vp-compass{display:flex;gap:12px;align-items:flex-start;margin:0 0 26px;padding:14px 18px;border-radius:var(--radius);background:linear-gradient(180deg,var(--c-brand-soft),transparent);border:1px solid var(--c-brand-line);font-size:14.5px;color:var(--c-text-2)}
.vp-compass-badge{flex:none;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#fff;background:var(--c-brand);padding:4px 9px;border-radius:20px;margin-top:1px}
html[data-theme=dark] .vp-compass-badge{background:var(--c-brand-2);color:#00263f}

/* table */
.vp-table-wrap{overflow-x:auto;margin:20px 0}
.vp-doc table{border-collapse:collapse;width:100%;font-size:14px}
.vp-doc th,.vp-doc td{border:1px solid var(--c-border);padding:9px 13px;text-align:left;vertical-align:top}
.vp-doc th{background:var(--c-bg-alt);font-weight:700}
.vp-doc tr:nth-child(even) td{background:var(--c-bg-alt)}

/* link lists / cards */
.vp-linklist{margin:26px 0}
.vp-linklist-h{font-size:16px;font-weight:700;margin:0 0 4px}
.vp-linklist-note{font-size:14px;color:var(--c-text-2);margin:0 0 14px}
.vp-linkcards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.vp-linkcard{display:flex;flex-direction:column;gap:4px;padding:14px 16px;border:1px solid var(--c-border);border-radius:var(--radius);background:var(--c-bg);transition:border-color .15s,transform .15s,box-shadow .15s}
.vp-linkcard:hover{border-color:var(--c-brand-line);transform:translateY(-1px);box-shadow:var(--shadow)}
.vp-linkcard-t{font-weight:700;font-size:14.5px;color:var(--c-text)}
.vp-linkcard-d{font-size:13px;color:var(--c-text-2);line-height:1.45}
.vp-linkcard-host{font-family:var(--mono);font-size:11px;color:var(--c-text-3);margin-top:2px}
.vp-source{font-size:13px;color:var(--c-text-3);margin-top:26px}

/* doc footer / pager */
.vp-doc-footer{display:flex;justify-content:space-between;gap:16px;margin-top:48px;padding-top:24px;border-top:1px solid var(--c-divider)}
.vp-pager{flex:1;max-width:48%;display:flex;flex-direction:column;gap:4px;padding:12px 16px;border:1px solid var(--c-border);border-radius:var(--radius);transition:border-color .15s}
.vp-pager:hover{border-color:var(--c-brand-line)}
.vp-pager.next{text-align:right;align-items:flex-end}
.vp-pager-k{font-size:12px;color:var(--c-text-3);font-weight:600}
.vp-pager-t{display:flex;align-items:center;gap:7px;font-weight:700;color:var(--c-brand-3);font-size:14.5px}

/* aside */
.vp-aside{width:var(--aside-w);flex:none;position:sticky;top:calc(var(--nav-h) + 24px);height:max-content;padding-top:40px}
.vp-aside-title{font-size:13px;font-weight:800;margin:0 0 10px;color:var(--c-text)}
.vp-aside ul{list-style:none;margin:0;padding:0;border-left:1px solid var(--c-divider)}
.vp-aside li a{display:block;padding:4px 0 4px 14px;font-size:13px;color:var(--c-text-2);line-height:1.4}
.vp-aside li a:hover{color:var(--c-brand-3)}

.vp-page-foot{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:40px 0 0;padding-top:22px;border-top:1px solid var(--c-divider);font-size:12.5px;color:var(--c-text-3)}

/* ---------- home ---------- */
.vp-home{padding:56px 0 72px}
.vp-hero{display:grid;grid-template-columns:1.15fr .85fr;gap:48px;align-items:center;margin-bottom:64px}
.vp-hero-eyebrow{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--c-brand-3);margin:0 0 14px}
.vp-hero-title{font-size:62px;line-height:1.02;letter-spacing:-.03em;font-weight:800;margin:0 0 20px}
.vp-hero-title .brand{color:var(--c-brand-3)}
.vp-hero-tagline{font-size:19px;line-height:1.55;color:var(--c-text-2);margin:0 0 30px;max-width:33ch}
.vp-hero-actions{display:flex;flex-wrap:wrap;gap:12px}
.vp-btn{display:inline-flex;align-items:center;gap:8px;height:46px;padding:0 22px;border-radius:23px;font-weight:700;font-size:15px;transition:transform .15s,box-shadow .15s}
.vp-btn.brand{background:var(--c-brand);color:#fff}
html[data-theme=dark] .vp-btn.brand{background:var(--c-brand-2);color:#00263f}
.vp-btn.brand:hover{background:var(--c-brand-2);color:#fff;transform:translateY(-1px);box-shadow:var(--shadow)}
.vp-btn.alt{background:var(--c-bg-alt);color:var(--c-text);border:1px solid var(--c-border)}
.vp-btn.alt:hover{border-color:var(--c-brand-line);color:var(--c-brand-3)}

/* compass graphic */
.vp-compass-graphic{position:relative;aspect-ratio:1;max-width:360px;margin-left:auto;border-radius:20px;background:var(--c-bg-alt);border:1px solid var(--c-border);display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;padding:2px;overflow:hidden}
.q{display:flex;flex-direction:column;justify-content:center;align-items:center;background:var(--c-bg);padding:12px;gap:2px}
.q span{font-weight:800;font-size:16px;color:var(--c-text)}
.q em{font-size:11px;font-style:normal;color:var(--c-text-3);text-transform:uppercase;letter-spacing:.05em}
.q1{border-radius:16px 0 0 0}.q2{border-radius:0 16px 0 0}.q3{border-radius:0 0 0 16px}.q4{border-radius:0 0 16px 0}
.q1 span,.q4 span{color:var(--c-brand-3)}
.vp-compass-graphic .axis{display:none}

.vp-features{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:44px}
.vp-feature{display:flex;flex-direction:column;gap:10px;padding:22px;border-radius:14px;background:var(--c-bg-alt);border:1px solid transparent;transition:border-color .15s,transform .15s,box-shadow .15s}
.vp-feature:hover{border-color:var(--c-brand-line);transform:translateY(-2px);box-shadow:var(--shadow)}
.vp-feature-ic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;background:var(--c-bg);color:var(--c-brand-3);border:1px solid var(--c-border)}
.vp-feature-t{font-weight:800;font-size:16.5px;color:var(--c-text)}
.vp-feature-d{font-size:13.5px;color:var(--c-text-2);line-height:1.5}
.vp-home-note{font-size:13.5px;color:var(--c-text-3);text-align:center;border-top:1px solid var(--c-divider);padding-top:26px}

/* ---------- search ---------- */
.vp-search-mask{position:fixed;inset:0;z-index:60;background:rgba(10,20,35,.45);backdrop-filter:blur(3px);display:flex;justify-content:center;align-items:flex-start;padding-top:12vh}
.vp-search-box{width:min(600px,92vw);background:var(--c-bg);border:1px solid var(--c-border);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.35);overflow:hidden;max-height:74vh;display:flex;flex-direction:column}
.vp-search-head{display:flex;align-items:center;gap:11px;padding:14px 16px;border-bottom:1px solid var(--c-divider);color:var(--c-text-3)}
.vp-search-head input{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:16px;color:var(--c-text)}
.vp-search-head .vp-kbd{cursor:pointer;background:none}
.vp-search-results{overflow-y:auto;padding:8px}
.vp-search-hit{display:flex;flex-direction:column;gap:2px;padding:10px 12px;border-radius:9px}
.vp-search-hit:hover{background:var(--c-brand-soft)}
.vp-search-hit-t{font-weight:700;font-size:14.5px;color:var(--c-text)}
.vp-search-hit-s{font-size:12.5px;color:var(--c-text-3)}
.vp-search-empty{padding:24px 14px;text-align:center;color:var(--c-text-3);font-size:14px}

/* ---------- responsive ---------- */
.vp-sidebar-scrim{display:none}
@media(max-width:1279px){.vp-aside{display:none}}
@media(max-width:959px){
  .vp-nav-links{display:none}
  .vp-hamburger{display:block}
  .vp-search-btn span:first-of-type{display:none}
  .vp-doc-layout{padding-left:0}
  .vp-sidebar-wrap{position:fixed;top:var(--nav-h);left:0;bottom:0;background:var(--c-bg);border-right:1px solid var(--c-divider);z-index:40;transform:translateX(-100%);transition:transform .22s;padding-left:22px;width:300px}
  .vp-shell.sb-open .vp-sidebar-wrap{transform:none}
  .vp-shell.sb-open .vp-sidebar-scrim{display:block;position:fixed;inset:var(--nav-h) 0 0 0;background:rgba(10,20,35,.4);z-index:35}
  .vp-hero{grid-template-columns:1fr}
  .vp-hero-figure{display:none}
  .vp-hero-title{font-size:46px}
  .vp-features{grid-template-columns:1fr 1fr}
  .vp-linkcards{grid-template-columns:1fr}
}
@media(max-width:560px){.vp-features{grid-template-columns:1fr}.vp-doc h1{font-size:27px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="collections.jsx"></script>
<script type="text/babel" src="pages1.jsx"></script>
<script type="text/babel" src="pages2.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
