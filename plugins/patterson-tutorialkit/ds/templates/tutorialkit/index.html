<!-- @template name="TutorialKit" description="Patterson-branded TutorialKit starter — a themed interactive-tutorial platform with a 5-part, 18-lesson agent-tooling curriculum (AGENTS.md, CLAUDE.md, design.md, skills, MCP, plugins, marketplaces, and every Patterson plugin). This page previews the themed shell with the full lesson tree; the runnable Astro project sits alongside it." -->
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patterson — TutorialKit Preview</title>
<link rel="stylesheet" href="./theme.css">
<style>
  /* Preview chrome — every color is a --tk-* variable from theme.css, so what
     you see is exactly what the real TutorialKit app renders. */
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--tk-background-secondary);
    color: var(--tk-elements-content-textColor, #58585b);
    font-family: var(--tk-font-sans);
    font-size: 14px;
  }
  a { color: #00A8E1; }
  a:hover { color: #003767; }
  .app { height: 100vh; display: grid; grid-template-rows: auto auto 1fr; background: var(--tk-elements-app-backgroundColor); }

  /* --- Top bar --------------------------------------------------------- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; padding: 0 20px;
    background: var(--tk-elements-topBar-backgroundColor);
  }
  .topbar img { height: 22px; display: block; }
  .switcher { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 13px; font-weight: 600; }
  .switcher select {
    font: inherit; font-weight: 600; padding: 7px 12px; border-radius: 999px;
    background: rgba(255,255,255,0.12); color: #fff;
    border: 1px solid rgba(255,255,255,0.28); cursor: pointer;
  }
  .switcher select option { color: #1d1d20; }

  /* --- Breadcrumb bar --------------------------------------------------- */
  .breadcrumbs {
    position: relative; display: flex; align-items: center; gap: 10px;
    height: 44px; padding: 0 20px;
    background: var(--tk-elements-panel-header-backgroundColor);
    border-bottom: 1px solid var(--tk-elements-app-borderColor);
    font-size: 13px;
  }
  .crumb-toggle {
    display: flex; align-items: center; gap: 8px; max-width: 70vw;
    padding: 6px 12px; border-radius: 8px; cursor: pointer;
    border: 1px solid var(--tk-elements-app-borderColor, #ccd7e1);
    background: var(--tk-elements-panel-backgroundColor, #fff);
    color: var(--tk-elements-panel-header-textColor, #003767);
    font: inherit; font-weight: 600; white-space: nowrap; overflow: hidden;
  }
  .crumb-toggle span { overflow: hidden; text-overflow: ellipsis; }
  .crumb-divider { color: var(--tk-elements-panel-header-iconColor, #99afc2); }
  .crumb-caret { color: #00a8e1; font-size: 10px; }
  .lesson-count { margin-left: auto; color: var(--tk-elements-panel-textColor); font-size: 12px; }

  /* --- Lesson-tree popover ---------------------------------------------- */
  .tree-pop {
    position: absolute; top: 42px; left: 16px; z-index: 40;
    width: 380px; max-height: min(64vh, 560px); overflow: auto;
    background: var(--tk-elements-panel-backgroundColor);
    border: 1px solid var(--tk-elements-app-borderColor);
    border-radius: 12px; box-shadow: 0 18px 44px rgba(0,25,46,0.22);
    padding: 10px 8px 12px; display: none;
  }
  .tree-pop.open { display: block; }
  .tree-part { margin: 6px 4px 0; }
  .tree-part > .tp-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--tk-elements-panel-header-textColor); padding: 8px 8px 4px;
  }
  .tree-ch > .tc-title { font-size: 12px; font-weight: 600; color: var(--tk-elements-panel-textColor); padding: 6px 8px 2px 14px; }
  .tree-lesson {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 6px 8px 6px 22px; border: 0; border-radius: 8px; cursor: pointer;
    background: var(--tk-elements-fileTree-file-backgroundColor);
    color: var(--tk-elements-fileTree-file-textColor);
    font: inherit; font-size: 13px; text-align: left;
  }
  .tree-lesson:hover { background: var(--tk-elements-fileTree-file-backgroundColorHover); color: var(--tk-elements-fileTree-file-textColorHover); }
  .tree-lesson.active {
    background: var(--tk-elements-fileTree-file-backgroundColorSelected);
    color: var(--tk-elements-fileTree-file-textColorSelected); font-weight: 600;
  }
  .tree-lesson .n { font-size: 11px; color: var(--tk-elements-fileTree-file-iconColor); min-width: 18px; }
  .tree-lesson.active .n { color: var(--tk-elements-fileTree-file-iconColorSelected); }
  .tree-lesson .done { margin-left: auto; color: #1F8A5B; font-size: 12px; }

  /* --- Main split ------------------------------------------------------- */
  .main { display: grid; grid-template-columns: minmax(380px, 46%) 1fr; min-height: 0; }
  .content {
    overflow: auto; padding: 28px 34px 48px;
    background: var(--tk-elements-panel-backgroundColor);
    border-right: 1px solid var(--tk-elements-app-borderColor);
  }
  .content-inner { max-width: 640px; }
  .content h1 { font-size: 26px; line-height: 1.2; color: var(--tk-elements-panel-header-textColor); margin: 0 0 14px; }
  .content h2 { font-size: 18px; color: var(--tk-elements-panel-header-textColor); margin: 26px 0 8px; }
  .content h3 { font-size: 15px; color: var(--tk-elements-panel-header-textColor); margin: 20px 0 6px; }
  .content p, .content li { line-height: 1.65; }
  .content code {
    font-family: var(--tk-font-mono, ui-monospace, monospace); font-size: 0.88em;
    background: var(--tk-elements-panel-header-backgroundColor);
    border: 1px solid var(--tk-elements-app-borderColor);
    border-radius: 5px; padding: 1px 5px;
  }
  .content table { border-collapse: collapse; margin: 10px 0; font-size: 13px; }
  .content th, .content td { border: 1px solid var(--tk-elements-app-borderColor); padding: 6px 12px; text-align: left; }
  .content th { background: var(--tk-elements-panel-header-backgroundColor); color: var(--tk-elements-panel-header-textColor); }

  .code-block { margin: 14px 0; border: 1px solid var(--tk-elements-app-borderColor); border-radius: 10px; overflow: hidden; }
  .code-title {
    font-family: var(--tk-font-mono, monospace); font-size: 11.5px;
    padding: 7px 12px; background: var(--tk-elements-panel-header-backgroundColor);
    color: var(--tk-elements-panel-header-textColor);
    border-bottom: 1px solid var(--tk-elements-app-borderColor);
  }
  .code-block pre { margin: 0; padding: 12px 14px; overflow: auto; background: #0e2438; }
  .code-block pre code { background: none; border: 0; padding: 0; color: #dbe9f4; font-size: 12.5px; line-height: 1.6; }

  .callout { margin: 16px 0; border-radius: 10px; padding: 12px 16px 6px; border: 1px solid; }
  .callout p { margin: 6px 0 10px; }
  .callout-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
  .callout-info    { background: #eaf7fd; border-color: #b3e5f8; } .callout-info    .callout-title { color: #006c96; }
  .callout-tip     { background: #f0f7ff; border-color: #c4dcf5; } .callout-tip     .callout-title { color: #0a5296; }
  .callout-warn    { background: #fdf3e2; border-color: #f3ddb0; } .callout-warn    .callout-title { color: #8a5a00; }
  .callout-danger  { background: #fdeceb; border-color: #f5c6c3; } .callout-danger  .callout-title { color: #a02c22; }
  .callout-success { background: #e9f6ef; border-color: #bfe4d0; } .callout-success .callout-title { color: #1F8A5B; }

  .nav-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 34px; }
  .nav-card {
    display: flex; flex-direction: column; gap: 4px; padding: 12px 16px;
    border: 1px solid var(--tk-elements-navCard-borderColor); border-radius: 10px;
    background: var(--tk-elements-navCard-backgroundColor);
    color: var(--tk-elements-navCard-textColor);
    font: inherit; text-align: left; cursor: pointer;
  }
  .nav-card:hover { background: var(--tk-elements-navCard-backgroundColorHover); border-color: var(--tk-elements-navCard-borderColorHover); }
  .nav-card.next { text-align: right; align-items: flex-end; grid-column: 2; }
  .nav-card .dir { font-size: 11px; color: var(--tk-elements-navCard-iconColor); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
  .nav-card .t { font-weight: 600; }
  .nav-card[disabled] { visibility: hidden; }

  /* --- Workspace -------------------------------------------------------- */
  .workspace { display: grid; grid-template-rows: 1fr 220px; min-height: 0; background: var(--tk-elements-panel-backgroundColor); }
  .editor-panel { display: grid; grid-template-rows: auto 1fr; min-height: 0; }
  .panel-head {
    display: flex; align-items: center; gap: 8px; height: 38px; padding: 0 12px;
    background: var(--tk-elements-panel-header-backgroundColor);
    border-bottom: 1px solid var(--tk-elements-app-borderColor);
    color: var(--tk-elements-panel-header-textColor); font-size: 12px; font-weight: 600;
  }
  .file-tab {
    display: flex; align-items: center; gap: 7px; align-self: stretch; margin-top: 1px;
    padding: 0 14px; font-family: var(--tk-font-mono, monospace); font-size: 12px; font-weight: 500;
    background: var(--tk-elements-panel-headerTab-backgroundColorActive);
    color: var(--tk-elements-panel-headerTab-textColorActive);
    border: 0; border-bottom: 2px solid var(--tk-elements-panel-headerTab-borderColorActive);
  }
  .panel-head .spacer { flex: 1; }
  .head-btn {
    font: inherit; font-size: 12px; font-weight: 600; cursor: pointer;
    padding: 5px 12px; border-radius: 7px;
    border: 1px solid var(--tk-elements-app-borderColor);
    background: var(--tk-elements-panel-headerButton-backgroundColor);
    color: var(--tk-elements-panel-headerButton-textColor);
  }
  .head-btn:hover { background: var(--tk-elements-panel-headerButton-backgroundColorHover); color: var(--tk-elements-panel-headerButton-textColorHover); }
  .head-btn.primary { background: #00A8E1; border-color: #00A8E1; color: #fff; }
  .head-btn.primary:hover { background: #0092c4; color: #fff; }
  .head-btn[disabled] { opacity: 0.5; cursor: default; }

  .editor-wrap { position: relative; min-height: 0; }
  textarea.editor {
    width: 100%; height: 100%; resize: none; border: 0; outline: none;
    padding: 14px 16px; tab-size: 2;
    font-family: var(--tk-font-mono, ui-monospace, monospace); font-size: 13px; line-height: 1.6;
    background: var(--tk-elements-editor-backgroundColor);
    color: var(--tk-elements-editor-textColor);
    caret-color: var(--tk-elements-editor-cursorColor);
  }

  .terminal-panel { display: grid; grid-template-rows: auto 1fr; min-height: 0; border-top: 1px solid var(--tk-elements-app-borderColor); }
  .terminal {
    overflow: auto; padding: 12px 16px; white-space: pre-wrap;
    font-family: var(--tk-font-mono, ui-monospace, monospace); font-size: 12.5px; line-height: 1.6;
    background: #0e2438; color: #dbe9f4;
  }
  .terminal .dim { color: #7d97ab; }
  .terminal .ok { color: #4fd28f; }
  .terminal .bad { color: #ff8d84; }

  .toast {
    position: fixed; bottom: 20px; right: 20px; z-index: 60;
    background: #003767; color: #fff; font-size: 13px; font-weight: 600;
    padding: 10px 16px; border-radius: 10px; box-shadow: 0 10px 28px rgba(0,25,46,0.35);
    opacity: 0; transform: translateY(8px); transition: opacity .2s, transform .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: none; }

  @media (max-width: 1000px) { .main { grid-template-columns: 1fr; } .workspace { display: none; } }
</style>
</head>
<body>
<div class="app">
  <header class="topbar" data-screen-label="TutorialKit shell">
    <img id="logo" src="./public/logo-dark.svg" alt="Patterson">
    <div class="switcher">
      <label for="themeSel">Theme</label>
      <select id="themeSel">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="dental">Dental</option>
        <option value="veterinary">Veterinary</option>
      </select>
    </div>
  </header>

  <div class="breadcrumbs">
    <button class="crumb-toggle" id="crumbBtn" aria-haspopup="true" aria-expanded="false">
      <span id="crumbPart">Part</span>
      <span class="crumb-divider">/</span>
      <span id="crumbCh">Chapter</span>
      <span class="crumb-divider">/</span>
      <span id="crumbLesson">Lesson</span>
      <span class="crumb-caret">▼</span>
    </button>
    <span class="lesson-count" id="lessonCount"></span>
    <nav class="tree-pop" id="treePop" aria-label="Lesson tree"></nav>
  </div>

  <div class="main">
    <section class="content"><div class="content-inner" id="lessonBody"></div>
      <div class="nav-cards content-inner">
        <button class="nav-card prev" id="navPrev"><span class="dir">← Previous</span><span class="t" id="navPrevT"></span></button>
        <button class="nav-card next" id="navNext"><span class="dir">Next →</span><span class="t" id="navNextT"></span></button>
      </div>
    </section>

    <section class="workspace">
      <div class="editor-panel">
        <div class="panel-head">
          <button class="file-tab" id="fileTab">file</button>
          <div class="spacer"></div>
          <button class="head-btn" id="btnReset">Reset</button>
          <button class="head-btn" id="btnSolve">Solve</button>
          <button class="head-btn primary" id="btnRun">Run validator ▸</button>
        </div>
        <div class="editor-wrap"><textarea class="editor" id="editor" spellcheck="false" aria-label="Lesson editor"></textarea></div>
      </div>
      <div class="terminal-panel">
        <div class="panel-head">Terminal — WebContainer</div>
        <div class="terminal" id="term"></div>
      </div>
    </section>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="./lessons-data.js"></script>
<script>
(function () {
  const L = window.TK_LESSONS;
  const $ = (id) => document.getElementById(id);
  const LS_LESSON = 'tk-preview-lesson';
  const LS_FILES = 'tk-preview-files-v2';
  const LS_DONE = 'tk-preview-done';

  let cur = 0;
  let edits = {};
  let done = {};
  try { edits = JSON.parse(localStorage.getItem(LS_FILES) || '{}'); } catch {}
  try { done = JSON.parse(localStorage.getItem(LS_DONE) || '{}'); } catch {}
  const savedId = localStorage.getItem(LS_LESSON);
  if (savedId) { const i = L.findIndex(x => x.id === savedId); if (i >= 0) cur = i; }

  const PROMPT = '<span class="dim">~/tutorial $</span> ';
  let runSeq = 0;

  function toast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toast._h);
    toast._h = setTimeout(() => t.classList.remove('show'), 2200);
  }

  function saveEdits() { try { localStorage.setItem(LS_FILES, JSON.stringify(edits)); } catch {} }
  function saveDone() { try { localStorage.setItem(LS_DONE, JSON.stringify(done)); } catch {} }

  // ---- Lesson tree popover ----
  function buildTree() {
    const pop = $('treePop');
    pop.innerHTML = '';
    let lastPart = null, lastCh = null, partEl = null, chEl = null;
    L.forEach((ls, i) => {
      if (ls.part !== lastPart) {
        lastPart = ls.part; lastCh = null;
        partEl = document.createElement('div'); partEl.className = 'tree-part';
        partEl.innerHTML = '<div class="tp-title">' + ls.part + '</div>';
        pop.appendChild(partEl);
      }
      if (ls.chapter !== lastCh) {
        lastCh = ls.chapter;
        chEl = document.createElement('div'); chEl.className = 'tree-ch';
        chEl.innerHTML = '<div class="tc-title">' + ls.chapter + '</div>';
        partEl.appendChild(chEl);
      }
      const b = document.createElement('button');
      b.className = 'tree-lesson' + (i === cur ? ' active' : '');
      b.innerHTML = '<span class="n">' + String(ls.num).padStart(2, '0') + '</span><span>' + ls.title + '</span>'
        + (done[ls.id] ? '<span class="done">✓</span>' : '');
      b.addEventListener('click', () => { openLesson(i); togglePop(false); });
      chEl.appendChild(b);
    });
  }
  function togglePop(force) {
    const pop = $('treePop');
    const open = force !== undefined ? force : !pop.classList.contains('open');
    pop.classList.toggle('open', open);
    $('crumbBtn').setAttribute('aria-expanded', String(open));
    if (open) buildTree();
  }
  $('crumbBtn').addEventListener('click', (e) => { e.stopPropagation(); togglePop(); });
  document.addEventListener('click', (e) => { if (!$('treePop').contains(e.target)) togglePop(false); });

  // ---- Lesson rendering ----
  function openLesson(i) {
    cur = Math.max(0, Math.min(L.length - 1, i));
    const ls = L[cur];
    localStorage.setItem(LS_LESSON, ls.id);
    runSeq += 1; $('btnRun').disabled = false;
    $('crumbPart').textContent = ls.part;
    $('crumbCh').textContent = ls.chapter;
    $('crumbLesson').textContent = ls.title;
    $('lessonCount').textContent = 'Lesson ' + ls.num + ' of ' + L.length;
    $('lessonBody').innerHTML = ls.html;
    $('fileTab').textContent = ls.artifact;
    $('editor').value = edits[ls.id] !== undefined ? edits[ls.id] : ls.starter;
    $('term').innerHTML = PROMPT;
    const prev = L[cur - 1], next = L[cur + 1];
    $('navPrev').toggleAttribute('disabled', !prev);
    $('navNext').toggleAttribute('disabled', !next);
    $('navPrevT').textContent = prev ? prev.title : '';
    $('navNextT').textContent = next ? next.title : '';
    document.querySelector('.content').scrollTop = 0;
  }
  $('navPrev').addEventListener('click', () => openLesson(cur - 1));
  $('navNext').addEventListener('click', () => openLesson(cur + 1));

  $('editor').addEventListener('input', () => { edits[L[cur].id] = $('editor').value; saveEdits(); });

  // ---- Buttons ----
  $('btnReset').addEventListener('click', () => {
    delete edits[L[cur].id]; saveEdits();
    $('editor').value = L[cur].starter;
    runSeq += 1; $('btnRun').disabled = false;
    $('term').innerHTML = PROMPT;
    toast('Reset to the starter file');
  });
  $('btnSolve').addEventListener('click', () => {
    edits[L[cur].id] = L[cur].solution; saveEdits();
    $('editor').value = L[cur].solution;
    toast('Solution loaded — run the validator');
  });

  function getChecks(ls) {
    // checksSrc is the literal array body from the lesson's real validate.mjs
    return new Function('return [' + ls.checksSrc + '];')();
  }

  $('btnRun').addEventListener('click', () => {
    const ls = L[cur];
    const src = $('editor').value;
    let obj = null;
    if (ls.jsonMode) { try { obj = JSON.parse(src); } catch {} }
    let checks;
    try { checks = getChecks(ls); }
    catch (e) { $('term').innerHTML = PROMPT + 'node validate.mjs\n<span class="bad">validator error: ' + e.message + '</span>\n'; return; }
    const lines = checks.map((c) => {
      let ok = false;
      try { ok = !!c.test(src, obj); } catch { ok = false; }
      return { ok, label: c.label };
    });
    const fails = lines.filter(l => !l.ok).length;
    const out = lines.map(l => (l.ok ? '<span class="ok">✓</span> ' : '<span class="bad">✗</span> ') + l.label);
    out.push('');
    out.push(fails
      ? '<span class="bad">FAIL — ' + fails + ' check(s) to fix. Edit ' + ls.artifact + ' and re-run.</span>'
      : '<span class="ok">PASS — on brand!</span>');
    stream(out, () => {
      if (!fails) { done[ls.id] = true; saveDone(); toast('Lesson complete ✓'); }
    });
  });

  function stream(lines, onDone) {
    const my = ++runSeq;
    const term = $('term');
    term.innerHTML = PROMPT + 'node validate.mjs\n';
    $('btnRun').disabled = true;
    let i = 0;
    (function next() {
      if (my !== runSeq) return;
      if (i >= lines.length) { $('btnRun').disabled = false; if (onDone) onDone(); return; }
      term.innerHTML += lines[i] + '\n';
      term.scrollTop = term.scrollHeight;
      i += 1;
      setTimeout(next, 140);
    })();
  }

  // ---- Theme ----
  const themeSel = $('themeSel');
  const savedTheme = localStorage.getItem('tk-preview-theme');
  if (savedTheme) { document.documentElement.setAttribute('data-theme', savedTheme); themeSel.value = savedTheme; }
  themeSel.addEventListener('change', () => {
    document.documentElement.setAttribute('data-theme', themeSel.value);
    localStorage.setItem('tk-preview-theme', themeSel.value);
  });

  openLesson(cur);
})();
</script>
</body>
</html>
