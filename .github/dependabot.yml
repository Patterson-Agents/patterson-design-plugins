# Dependabot configuration — keeps the repo's real dependency surface current.
# The marketplace itself ships no runtime deps; the only npm manifest is the
# runnable TutorialKit starter under plugins/patterson-tutorialkit/ds/.
version: 2
updates:
  # --- TutorialKit starter (the one npm manifest in the repo) ---
  - package-ecosystem: "npm"
    directory: "/plugins/patterson-tutorialkit/ds/templates/tutorialkit"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      tutorialkit-template:
        patterns: ["*"]
    ignore:
      # astro is transitively pinned to ^4 by @tutorialkit/astro (latest 1.6.0).
      # A major/minor astro bump cannot merge until TutorialKit ships astro-5+
      # support, so suppress that noise here. Security alerts still surface via
      # Dependabot alerts (repo Settings → Security), and react/@types/react are
      # likewise held at the v18 line TutorialKit 1.6 requires.
      - dependency-name: "astro"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]

  # --- GitHub Actions used by the CI workflows (clean, always-mergeable) ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      ci-actions:
        patterns: ["*"]
