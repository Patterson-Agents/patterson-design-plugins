="#dceefb">deck-builder.md</text><text x="86" y="374" font-family="SFMono-Regular,Consolas,monospace" font-size="12.5" fill="#9fd8f2">ds/</text><text x="108" y="400" font-family="SFMono-Regular,Consolas,monospace" font-size="12.5" fill="#dceefb">styles.css · tokens/</text><text x="108" y="426" font-family="SFMono-Regular,Consolas,monospace" font-size="12.5" fill="#dceefb">assets/{brand,fonts}/</text><text x="108" y="452" font-family="SFMono-Regular,Consolas,monospace" font-size="12.5" fill="#dceefb">templates/deck/index.html</text><text x="86" y="478" font-family="SFMono-Regular,Consolas,monospace" font-size="12.5" fill="#9fd8f2">README.md</text><path d="M440,192 L486,192" stroke="#147EC2" stroke-width="2" fill="none" marker-end="url(#arr)"></path><rect x="490" y="166" width="450" height="68" rx="8" fill="#ffffff" stroke="#d5dde6" stroke-width="1.5" filter="url(#soft)"></rect><text x="508" y="188" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#147EC2">plugin.json</text><text x="508" y="206" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11.5" fill="#58585B" font-weight="400">Manifest — the only file allowed</text><text x="508" y="221" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11.5" fill="#58585B" font-weight="400">inside .claude-plugin/.</text><path d="M440,244 L486,244" stroke="#147EC2" stroke-width="2" fill="none" marker-end="url(#arr)"></path><rect x="490" y="218" width="450" height="68" rx="8" fill="#ffffff" stroke="#d5dde6" stroke-width="1.5" filter="url(#soft)"></rect><text x="508" y="240" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#147EC2">SKILL.md</text><text x="508" y="258" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11.5" fill="#58585B" font-weight="400">Brand + workflow knowledge. Auto-</text><text x="508" y="273" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11.5" fill="#58585B" font-weight="400">invoked, or run by name.</text><path d="M440,296 L486,296" stroke="#147EC2" stroke-width="2" fill="none" marker-end="url(#arr)"></path><rect x="490" y="270" width="450" height="68" rx="8" fill="#ffffff" stroke="#d5dde6" stroke-width="1.5" filter="url(#soft)"></rect><text x="508" y="292" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#147EC2">new-deck.md</text><text x="508" y="310" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11.5" fill="#58585B" font-weight="400">Slash command: /patterson-deck:</text><text x="508" y="325" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11.5" fill="#58585B" font-weight="400">new-deck [brief] — scaffolds ds/.</text><path d="M440,348 L486,348" stroke="#147EC2" stroke-width="2" fill="none" marker-end="url(#arr)"></path><rect x="490" y="322" width="450" height="68" rx="8" fill="#ffffff" stroke="#d5dde6" stroke-width="1.5" filter="url(#soft)"></rect><text x="508" y="344" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#147EC2">deck-builder.md</text><text x="508" y="362" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11.5" fill="#58585B" font-weight="400">Subagent Claude delegates deck</text><text x="508" y="377" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11.5" fill="#58585B" font-weight="400">work to automatically.</text><path d="M440,438 L486,438" stroke="#147EC2" stroke-width="2" fill="none" marker-end="url(#arr)"></path><rect x="490" y="412" width="450" height="83" rx="8" fill="#ffffff" stroke="#d5dde6" stroke-width="1.5" filter="url(#soft)"></rect><text x="508" y="434" font-family="SFMono-Regular,Consolas,monospace" font-size="12" fill="#147EC2">ds/</text><text x="508" y="452" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11.5" fill="#58585B" font-weight="400">Self-contained snapshot mirroring</text><text x="508" y="467" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11.5" fill="#58585B" font-weight="400">the source tree — ../../styles.css</text><text x="508" y="482" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11.5" fill="#58585B" font-weight="400">always resolves.</text></svg>