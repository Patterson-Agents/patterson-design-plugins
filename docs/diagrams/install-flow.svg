<svg xmlns="http://www.w3.org/2000/svg" width="980" height="270" viewBox="0 0 980 270"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#147EC2"></path></marker><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#003767" flood-opacity="0.16"></feDropShadow></filter></defs><rect width="980" height="270" rx="14" fill="#f4f7fa"></rect><text x="40" y="44" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11" fill="#00A8E1" font-weight="700" letter-spacing="0.14em">FOUR STEPS</text><text x="40" y="72" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="18" fill="#003767" font-weight="800">From zero to on-brand output</text><rect x="40" y="100" width="210" height="120" rx="12" fill="#ffffff" stroke="#d5dde6" stroke-width="1.5" filter="url(#soft)"></rect><text x="58" y="132" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="13.5" fill="#003767" font-weight="700">1 · Add the marketplace</text><text x="58" y="162" font-family="SFMono-Regular,Consolas,monospace" font-size="10.5" fill="#147EC2">/plugin marketplace add</text><text x="58" y="180" font-family="SFMono-Regular,Consolas,monospace" font-size="9" fill="#58585B">patterson-agents/design-system</text><path d="M252,160 L280,160" stroke="#147EC2" stroke-width="2" fill="none" marker-end="url(#arr)"></path><rect x="282" y="100" width="210" height="120" rx="12" fill="#ffffff" stroke="#d5dde6" stroke-width="1.5" filter="url(#soft)"></rect><text x="300" y="132" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="13.5" fill="#003767" font-weight="700">2 · Install a plugin</text><text x="300" y="162" font-family="SFMono-Regular,Consolas,monospace" font-size="10.5" fill="#147EC2">/plugin install</text><text x="300" y="180" font-family="SFMono-Regular,Consolas,monospace" font-size="10.5" fill="#58585B">patterson-deck@…design</text><path d="M494,160 L522,160" stroke="#147EC2" stroke-width="2" fill="none" marker-end="url(#arr)"></path><rect x="524" y="100" width="210" height="120" rx="12" fill="#ffffff" stroke="#d5dde6" stroke-width="1.5" filter="url(#soft)"></rect><text x="542" y="132" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="13.5" fill="#003767" font-weight="700">3 · Run the command</text><text x="542" y="162" font-family="SFMono-Regular,Consolas,monospace" font-size="10.5" fill="#147EC2">/patterson-deck:new-deck</text><text x="542" y="180" font-family="SFMono-Regular,Consolas,monospace" font-size="10.5" fill="#58585B">Q3 dental business review</text><path d="M736,160 L764,160" stroke="#147EC2" stroke-width="2" fill="none" marker-end="url(#arr)"></path><rect x="766" y="100" width="210" height="120" rx="12" fill="#003767" stroke="none" stroke-width="1.5" filter="url(#soft)"></rect><text x="784" y="132" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="13.5" fill="#ffffff" font-weight="700">4 · Preview &amp; iterate</text><text x="784" y="162" font-family="SFMono-Regular,Consolas,monospace" font-size="10.5" fill="#9fd8f2">open patterson/templates</text><text x="784" y="180" font-family="SFMono-Regular,Consolas,monospace" font-size="10.5" fill="#dceefb">/deck/index.html</text></svg>