<svg xmlns="http://www.w3.org/2000/svg" width="980" height="400" viewBox="0 0 980 400"><defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#147EC2"></path></marker><filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#003767" flood-opacity="0.16"></feDropShadow></filter></defs><rect width="980" height="400" rx="14" fill="#f4f7fa"></rect><text x="40" y="44" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11" fill="#00A8E1" font-weight="700" letter-spacing="0.14em">WHY SNAPSHOTS MIRROR THE SOURCE TREE</text><text x="40" y="72" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="18" fill="#003767" font-weight="800">Relative paths survive the copy untouched</text><rect x="40" y="100" width="430" height="270" rx="12" fill="#ffffff" stroke="#d5dde6" stroke-width="1.5" filter="url(#soft)"></rect><text x="64" y="140" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#003767">ds/  (copied into your project as ./patterson)</text><text x="84" y="168" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#147EC2">styles.css</text><text x="84" y="196" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#58585B">tokens/*.css</text><text x="84" y="224" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#147EC2">assets/brand/*.svg</text><text x="84" y="252" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#58585B">assets/fonts/*.woff2</text><text x="84" y="280" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#58585B">templates/</text><text x="104" y="308" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#58585B">deck/</text><text x="124" y="336" font-family="SFMono-Regular,Consolas,monospace" font-size="13" fill="#003767">index.html</text><path d="M262,332 C330,332 330,164 155,162" stroke="#00A8E1" stroke-width="2" fill="none" marker-end="url(#arr)" opacity="0.9"></path><path d="M262,340 C356,344 356,222 235,218" stroke="#00A8E1" stroke-width="2" fill="none" marker-end="url(#arr)" opacity="0.55"></path><text x="300" y="300" font-family="SFMono-Regular,Consolas,monospace" font-size="11" fill="#147EC2">../../…</text><rect x="510" y="120" width="430" height="230" rx="12" fill="#003767" stroke="none" stroke-width="1.5" filter="url(#soft)"></rect><text x="532" y="152" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="11" fill="#00A8E1" font-weight="700" letter-spacing="0.14em">INSIDE INDEX.HTML</text><text x="532" y="184" font-family="SFMono-Regular,Consolas,monospace" font-size="12.5" fill="#9fd8f2">&lt;link href=&#34;../../styles.css&#34;&gt;</text><text x="532" y="208" font-family="SFMono-Regular,Consolas,monospace" font-size="12.5" fill="#9fd8f2">&lt;img src=&#34;../../assets/brand/</text><text x="560" y="226" font-family="SFMono-Regular,Consolas,monospace" font-size="12.5" fill="#9fd8f2">patterson-logo-white.svg&#34;&gt;</text><text x="532" y="266" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="12.5" fill="#dceefb" font-weight="400">Two levels up is always the snapshot root —</text><text x="532" y="284" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="12.5" fill="#dceefb" font-weight="400">in this repo, in the plugin cache, and in your</text><text x="532" y="302" font-family="Figtree,Segoe UI,Arial,sans-serif" font-size="12.5" fill="#dceefb" font-weight="400">project. Never flatten or move files in ds/.</text></svg>